<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pending Teacher Approvals</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin">Admin Panel</a>
        <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
    </div>
</nav>

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Pending Teacher Approvals</h2>
        <a href="/admin/users" class="btn btn-outline-secondary btn-sm">← Back to All Users</a>
    </div>

    <!-- success message -->
    <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>

    <!-- empty state -->
    <div th:if="${#lists.isEmpty(pendingTeachers)}" class="alert alert-info">
        No pending teacher approvals at the moment.
    </div>

    <div th:if="${!#lists.isEmpty(pendingTeachers)}" class="card shadow">
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${pendingTeachers}">
                    <td th:text="${u.userId}"></td>
                    <td th:text="${u.email}"></td>
                    <td>
                        <span th:text="${u.firstName}"></span>
                        <span th:text="${u.lastName}"></span>
                    </td>
                    <td th:text="${u.status}"></td>
                    <td>
                        <form th:action="@{'/admin/users/' + ${u.userId} + '/approve-teacher'}"
                              method="post"
                              style="display:inline">
                            <button type="submit" class="btn btn-sm btn-success">
                                ✓ Approve
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
