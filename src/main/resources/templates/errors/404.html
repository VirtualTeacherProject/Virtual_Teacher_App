<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>404 - Not Found</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-warning">
                <div class="card-body">
                    <h1 class="h3 text-warning mb-3">404 - Not Found</h1>

                    <img th:src="@{/images/404robot.png}" alt="404 Graphic" width="500">

                    <p th:text="${message}">The requested resource was not found.</p>

                    <a th:href="@{/}" class="btn btn-primary">Go Home</a>
                    <a th:href="@{/courses}" class="btn btn-outline-secondary">Browse Courses</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
